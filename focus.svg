<svg xmlns="http://www.w3.org/2000/svg" width="900" height="96" viewBox="0 0 900 96">
  <defs>
    <filter id="liqGlass" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.7 0.4" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="b" in2="n" scale="2.5" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feComposite in="d" in2="SourceGraphic" operator="atop"/>
    </filter>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040c0e"/>
      <stop offset="100%" stop-color="#020809"/>
    </linearGradient>
    <linearGradient id="panelG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="tileG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d9c8" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="900" height="96" fill="url(#bgG)"/>
  <rect width="900" height="96" fill="url(#grid)"/>

  <!-- Glass panel bg -->
  <rect width="900" height="96" fill="url(#panelG)" filter="url(#liqGlass)"/>
  <rect x="0" y="0" width="900" height="1" fill="url(#shine)" opacity="0.5"/>
  <rect x="0.5" y="0.5" width="899" height="95" fill="none" stroke="#00d9c8" stroke-width="1" stroke-opacity="0.1"/>

  <polyline points="0,12 0,0 12,0"           fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="888,0 900,0 900,12"       fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="0,84 0,96 12,96"          fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="888,96 900,96 900,84"     fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>

  <text x="36" y="22" font-family="Share Tech Mono,monospace" font-size="9" fill="#1e4a48" letter-spacing="3">FOCUS</text>

  <!-- 5 tiles — each is its own mini glass surface -->
  <!-- Tile helper: x, label, num -->
  <!-- Tile 1 -->
  <rect x="36"  y="32" width="152" height="48" fill="url(#tileG)" stroke="#00d9c8" stroke-width="0.5" stroke-opacity="0.15" filter="url(#liqGlass)"/>
  <rect x="36"  y="32" width="152" height="1"  fill="url(#shine)" opacity="0.4"/>
  <rect x="36"  y="32" width="2"   height="48" fill="#00d9c8" opacity="0.35"/>
  <text x="48"  y="47" font-family="Share Tech Mono,monospace" font-size="9"  fill="#0d2828" letter-spacing="1">01</text>
  <text x="48"  y="67" font-family="Share Tech Mono,monospace" font-size="11" fill="#4a8a88">Systems Arch.</text>

  <!-- Tile 2 -->
  <rect x="198" y="32" width="152" height="48" fill="url(#tileG)" stroke="#00d9c8" stroke-width="0.5" stroke-opacity="0.15" filter="url(#liqGlass)"/>
  <rect x="198" y="32" width="152" height="1"  fill="url(#shine)" opacity="0.4"/>
  <rect x="198" y="32" width="2"   height="48" fill="#00d9c8" opacity="0.35"/>
  <text x="210" y="47" font-family="Share Tech Mono,monospace" font-size="9"  fill="#0d2828" letter-spacing="1">02</text>
  <text x="210" y="67" font-family="Share Tech Mono,monospace" font-size="11" fill="#4a8a88">Defense Tech</text>

  <!-- Tile 3 -->
  <rect x="360" y="32" width="152" height="48" fill="url(#tileG)" stroke="#00d9c8" stroke-width="0.5" stroke-opacity="0.15" filter="url(#liqGlass)"/>
  <rect x="360" y="32" width="152" height="1"  fill="url(#shine)" opacity="0.4"/>
  <rect x="360" y="32" width="2"   height="48" fill="#00d9c8" opacity="0.35"/>
  <text x="372" y="47" font-family="Share Tech Mono,monospace" font-size="9"  fill="#0d2828" letter-spacing="1">03</text>
  <text x="372" y="67" font-family="Share Tech Mono,monospace" font-size="11" fill="#4a8a88">Full-Stack Eng.</text>

  <!-- Tile 4 -->
  <rect x="522" y="32" width="152" height="48" fill="url(#tileG)" stroke="#00d9c8" stroke-width="0.5" stroke-opacity="0.15" filter="url(#liqGlass)"/>
  <rect x="522" y="32" width="152" height="1"  fill="url(#shine)" opacity="0.4"/>
  <rect x="522" y="32" width="2"   height="48" fill="#00d9c8" opacity="0.35"/>
  <text x="534" y="47" font-family="Share Tech Mono,monospace" font-size="9"  fill="#0d2828" letter-spacing="1">04</text>
  <text x="534" y="67" font-family="Share Tech Mono,monospace" font-size="11" fill="#4a8a88">3D / WebGL</text>

  <!-- Tile 5 -->
  <rect x="684" y="32" width="180" height="48" fill="url(#tileG)" stroke="#00d9c8" stroke-width="0.5" stroke-opacity="0.15" filter="url(#liqGlass)"/>
  <rect x="684" y="32" width="180" height="1"  fill="url(#shine)" opacity="0.4"/>
  <rect x="684" y="32" width="2"   height="48" fill="#00d9c8" opacity="0.35"/>
  <text x="696" y="47" font-family="Share Tech Mono,monospace" font-size="9"  fill="#0d2828" letter-spacing="1">05</text>
  <text x="696" y="67" font-family="Share Tech Mono,monospace" font-size="11" fill="#4a8a88">Data &amp; APIs</text>
</svg>
