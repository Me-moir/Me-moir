<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
<defs>
  <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#060d2e"/>
    <stop offset="100%" stop-color="#02050f"/>
  </linearGradient>
  <linearGradient id="ftile" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a6eee" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#1a6eee" stop-opacity="0.02"/>
  </linearGradient>
</defs>

<rect width="900" height="110" fill="url(#fbg)" rx="2"/>
<rect width="900" height="110" fill="none" stroke="#6a8abf" stroke-width="1" rx="2"/>

<!-- corner brackets -->
<line x1="0" y1="0" x2="18" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="0" x2="0" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="882" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="900" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="110" x2="18" y2="110" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="110" x2="0" y2="92" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="110" x2="882" y2="110" stroke="#1a6eee" stroke-width="1.5"/>
