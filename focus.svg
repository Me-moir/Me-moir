<!-- glass catchlight -->
<line x1="80" y1="1" x2="820" y2="1" stroke="rgba(100,160,255,0.35)" stroke-width="0.5"/>

<!-- section label -->
<text x="28" y="22" font-family="'Courier New',monospace" font-size="9" fill="#6a8abf" letter-spacing="3">FOCUS</text>

