name: Update Commit Grid SVG

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-commitgrid:
    runs-on: ubuntu-latest
    name: Regenerate commitgrid.svg

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate commitgrid.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_commitgrid.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commitgrid.svg
          git diff --cached --quiet || git commit -m "chore: update commitgrid.svg [skip ci]"
          git pull --rebase origin main
          git push