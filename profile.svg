<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
<defs>
  <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#060d2e"/>
    <stop offset="100%" stop-color="#02050f"/>
  </linearGradient>
