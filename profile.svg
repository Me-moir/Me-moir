<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <style>
      .bg { fill: #080f10; }
      .panel-bg { fill: #080f10; stroke: #0d2f2f; stroke-width: 1; }
      .hdr { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #2a5a5a; letter-spacing: 3px; }
      .icon { fill: #00d9c8; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
      .tag { font-family: 'Share Tech Mono', monospace; font-size: 9px; fill: #0d2f2f; }
      .tag-box { fill: none; stroke: #0d2f2f; stroke-width: 1; }
      .key { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #2a5a5a; }
      .val { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #a8cece; }
      .val-teal { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #00d9c8; }
      .val-cyan { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #00d9c8; }
      .skill-name { font-family: 'Share Tech Mono', monospace; font-size: 12px; fill: #a8cece; }
      .skill-pct { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #00d9c8; }
      .bar-bg { fill: rgba(0,217,200,0.06); stroke: #0d2f2f; stroke-width: 1; }
      .avatar-box { fill: #0a1a1a; stroke: #00d9c8; stroke-width: 2; }
      .avatar-text { font-family: 'Share Tech Mono', monospace; font-size: 24px; fill: #00d9c8; font-weight: bold; }
      .corner { fill: none; stroke: #00d9c8; stroke-width: 1.5; }
      .divline { stroke: #0d2f2f; stroke-width: 1; }
      .section-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #2a5a5a; letter-spacing: 3px; }
    </style>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b5a5"/>
      <stop offset="100%" style="stop-color:#00d9c8"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d9c8" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="900" height="260" class="bg"/>
  <rect width="900" height="260" fill="url(#grid2)"/>

  <!-- LEFT PANEL: Operator Data (w=430) -->
  <rect x="0" y="0" width="440" height="260" class="panel-bg"/>
  <polyline points="0,14 0,0 14,0" class="corner"/>
  <polyline points="426,0 440,0 440,14" class="corner"/>
  <polyline points="0,246 0,260 14,260" class="corner"/>
  <polyline points="426,260 440,260 440,246" class="corner"/>

  <!-- Panel header -->
  <text x="18" y="20" class="icon">◈</text>
  <text x="34" y="20" class="hdr">OPERATOR DATA</text>
  <rect x="370" y="10" width="56" height="14" class="tag-box"/>
  <text x="398" y="20" text-anchor="middle" class="tag">PROFILE</text>
  <line x1="14" y1="28" x2="426" y2="28" class="divline"/>

  <!-- Avatar box -->
  <rect x="18" y="40" width="72" height="72" class="avatar-box">
    <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Scan line on avatar -->
  <rect x="18" y="40" width="72" height="3" fill="#00d9c8" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,69" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="54" y="82" text-anchor="middle" class="avatar-text">JJ</text>

  <!-- Operator rows -->
  <text x="106" y="56" class="key">HANDLE</text>
  <text x="200" y="56" class="val-teal">Me-moir</text>

  <text x="106" y="74" class="key">NAME</text>
  <text x="200" y="74" class="val">Janssen Jekk</text>

  <text x="106" y="92" class="key">CLASS</text>
  <text x="200" y="92" class="val-cyan">Full-Stack + 3D + Cloud</text>

  <text x="106" y="110" class="key">FOCUS</text>
  <text x="200" y="110" class="val">Intelligent Systems</text>

  <line x1="18" y1="124" x2="426" y2="124" class="divline"/>

  <!-- Extra rows below divider -->
  <text x="18" y="142" class="key">CLOUD</text>
  <text x="100" y="142" class="val">Vercel · AWS · GCP · Azure</text>

  <text x="18" y="160" class="key">COMMS</text>
  <text x="100" y="160" class="val">Open to collaboration</text>

  <text x="18" y="178" class="key">MODE</text>
  <text x="100" y="178" class="val-teal">lowkey</text>

  <line x1="18" y1="192" x2="426" y2="192" class="divline"/>

  <!-- Motto -->
  <text x="18" y="212" font-family="'Share Tech Mono',monospace" font-size="11" fill="#2a5a5a">// "Ship in silence. Let the commits speak."</text>

  <!-- Live indicator -->
  <circle cx="22" cy="238" r="3" fill="#00d9c8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="32" y="242" font-family="'Share Tech Mono',monospace" font-size="10" fill="#00d9c8">LIVE</text>
  <text x="70" y="242" font-family="'Share Tech Mono',monospace" font-size="10" fill="#2a5a5a">// SYS: ONLINE // NODE: GH-PROD-01</text>


  <!-- RIGHT PANEL: Skill Proficiency (x=450) -->
  <rect x="454" y="0" width="446" height="260" class="panel-bg"/>
  <polyline points="454,14 454,0 468,0" class="corner"/>
  <polyline points="886,0 900,0 900,14" class="corner"/>
  <polyline points="454,246 454,260 468,260" class="corner"/>
  <polyline points="886,260 900,260 900,246" class="corner"/>

  <text x="472" y="20" class="icon">◈</text>
  <text x="488" y="20" class="hdr">SKILL PROFICIENCY</text>
  <rect x="820" y="10" width="60" height="14" class="tag-box"/>
  <text x="850" y="20" text-anchor="middle" class="tag">METRICS</text>
  <line x1="468" y1="28" x2="886" y2="28" class="divline"/>

  <!-- Skill bars -->
  <!-- Next.js / React -->
  <text x="472" y="58" class="skill-name">Next.js / React</text>
  <text x="852" y="58" class="skill-pct">93%</text>
  <rect x="472" y="65" width="414" height="5" class="bar-bg"/>
  <rect x="472" y="65" width="0" height="5" fill="url(#barGrad)" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="385" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- TypeScript -->
  <text x="472" y="98" class="skill-name">TypeScript</text>
  <text x="852" y="98" class="skill-pct">90%</text>
  <rect x="472" y="105" width="414" height="5" class="bar-bg"/>
  <rect x="472" y="105" width="0" height="5" fill="url(#barGrad)" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="373" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- Three.js / WebGL -->
  <text x="472" y="138" class="skill-name">Three.js / WebGL</text>
  <text x="852" y="138" class="skill-pct">85%</text>
  <rect x="472" y="145" width="414" height="5" class="bar-bg"/>
  <rect x="472" y="145" width="0" height="5" fill="url(#barGrad)" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="352" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- Cloud (AWS / GCP) -->
  <text x="472" y="178" class="skill-name">Cloud (AWS / GCP)</text>
  <text x="852" y="178" class="skill-pct">82%</text>
  <rect x="472" y="185" width="414" height="5" class="bar-bg"/>
  <rect x="472" y="185" width="0" height="5" fill="url(#barGrad)" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="340" dur="1.7s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- GraphQL / tRPC -->
  <text x="472" y="218" class="skill-name">GraphQL / tRPC</text>
  <text x="852" y="218" class="skill-pct">80%</text>
  <rect x="472" y="225" width="414" height="5" class="bar-bg"/>
  <rect x="472" y="225" width="0" height="5" fill="url(#barGrad)" filter="url(#glow2)">
    <animate attributeName="width" from="0" to="331" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
</svg>
