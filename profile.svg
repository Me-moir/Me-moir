    <stop offset="0%" stop-color="#6a8abf"/>
    <stop offset="100%" stop-color="#1a6eee"/>
  </linearGradient>
  <filter id="barglow">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

