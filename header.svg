<svg xmlns="http://www.w3.org/2000/svg" width="900" height="210" viewBox="0 0 900 210">
  <defs>

    <!-- GLASS FILTERS -->
    <!-- Liquid distortion on the panel surface -->
    <filter id="liquidGlass" x="-2%" y="-2%" width="104%" height="104%">
      <!-- Frosted blur -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blurred"/>
      <!-- Turbulence for liquid texture -->
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.35" numOctaves="3" seed="7" result="noise"/>
      <!-- Subtle displacement — liquid refraction -->
      <feDisplacementMap in="blurred" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feComposite in="displaced" in2="SourceGraphic" operator="atop"/>
    </filter>

    <!-- Soft inner glow filter -->
    <filter id="titleGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Edge frost blur for glass border -->
    <filter id="frostEdge" x="-1%" y="-1%" width="102%" height="102%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>

    <!-- GRADIENTS -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#040c0e"/>
      <stop offset="100%" stop-color="#020809"/>
    </linearGradient>

    <!-- Glass panel background — very subtle teal tint -->
    <linearGradient id="glassBg" x1="0" y1="0" x2="0" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0.06"/>
      <stop offset="50%"  stop-color="#00d9c8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Top edge shine — the "glass catching light" effect -->
    <linearGradient id="topShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00d9c8" stop-opacity="0.0"/>
      <stop offset="38%"  stop-color="#c8fffc" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#ffffff"  stop-opacity="0.9"/>
      <stop offset="62%"  stop-color="#c8fffc" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#00d9c8" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0"/>
    </linearGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="45%"  stop-color="transparent"/>
      <stop offset="50%"  stop-color="rgba(200,255,252,0.06)"/>
      <stop offset="55%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Bottom fade -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0"/>
    </linearGradient>

    <!-- Stat divider -->
    <linearGradient id="divV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00d9c8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal fade horizontal -->
    <linearGradient id="tealH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00d9c8" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#00d9c8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d9c8" stroke-width="0.4" opacity="0.07"/>
    </pattern>

  </defs>

  <!-- BG + Grid -->
  <rect width="900" height="210" fill="url(#bgGrad)"/>
  <rect width="900" height="210" fill="url(#grid)"/>

  <!-- Background ambient glow orbs -->
  <ellipse cx="120" cy="60"  rx="200" ry="120" fill="#00d9c8" opacity="0.025" filter="url(#frostEdge)">
    <animate attributeName="rx" values="200;220;200" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.025;0.04;0.025" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="780" cy="160" rx="180" ry="100" fill="#00b5a5" opacity="0.02" filter="url(#frostEdge)">
    <animate attributeName="rx" values="180;160;180" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ═══ GLASS PANEL ═══ -->

  <!-- Panel base — frosted glass bg -->
  <rect x="0" y="0" width="900" height="210" fill="url(#glassBg)" filter="url(#liquidGlass)"/>

  <!-- Glass surface sheen — slight gradient from top -->
  <rect x="0" y="0" width="900" height="80" fill="url(#bottomFade)" opacity="0.4"/>

  <!-- Top edge highlight — the key liquid glass effect: bright catch-light along top edge -->
  <rect x="0" y="0" width="900" height="1" fill="url(#topShine)"/>

  <!-- Animated shimmer sweep across panel -->
  <rect x="-900" y="0" width="900" height="210" fill="url(#shimmer)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate"
      from="-900 0" to="1800 0" dur="6s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1"/>
  </rect>

  <!-- Outer glass border — subtle -->
  <rect x="0.5" y="0.5" width="899" height="209" fill="none"
        stroke="#00d9c8" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Corner brackets — crisp teal -->
  <polyline points="0,16 0,0 16,0"     fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.8"/>
  <polyline points="884,0 900,0 900,16" fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.8"/>
  <polyline points="0,194 0,210 16,210" fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.8"/>
  <polyline points="884,210 900,210 900,194" fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- ── CONTENT ── -->

  <!-- Status indicator -->
  <circle cx="845" cy="22" r="3.5" fill="#00d9c8">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;4.5;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="845" cy="22" r="7" fill="none" stroke="#00d9c8" stroke-width="0.8" opacity="0.2">
    <animate attributeName="r" values="5;10;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="856" y="26" font-family="Share Tech Mono,monospace" font-size="10" fill="#00d9c8" letter-spacing="1" opacity="0.6">ONLINE</text>

  <!-- TITLE -->
  <text x="48" y="100"
        font-family="Orbitron,Share Tech Mono,monospace"
        font-size="50" font-weight="900" letter-spacing="5"
        fill="#00d9c8" filter="url(#titleGlow)" opacity="0.95">JANSSEN JEKK</text>

  <!-- Subtle title echo / reflection below — glass depth illusion -->
  <text x="48" y="108"
        font-family="Orbitron,Share Tech Mono,monospace"
        font-size="50" font-weight="900" letter-spacing="5"
        fill="#00d9c8" opacity="0.04"
        transform="scale(1,-1) translate(0,-216)">JANSSEN JEKK</text>

  <!-- Handle -->
  <text x="52" y="122"
        font-family="Share Tech Mono,monospace"
        font-size="11" letter-spacing="5" fill="#00d9c8" opacity="0.2">@ME-MOIR</text>

  <!-- Thin divider -->
  <rect x="48" y="136" width="380" height="1" fill="#00d9c8" opacity="0.08"/>

  <!-- Focus areas -->
  <text x="50" y="157" font-family="Share Tech Mono,monospace" font-size="11" letter-spacing="2" fill="#3a7a78">Systems Architecture</text>
  <text x="248" y="157" font-family="Share Tech Mono,monospace" font-size="10" fill="#1a3a38">·</text>
  <text x="260" y="157" font-family="Share Tech Mono,monospace" font-size="11" letter-spacing="2" fill="#3a7a78">Defense Tech</text>
  <text x="362" y="157" font-family="Share Tech Mono,monospace" font-size="10" fill="#1a3a38">·</text>
  <text x="374" y="157" font-family="Share Tech Mono,monospace" font-size="11" letter-spacing="2" fill="#3a7a78">Full-Stack</text>
  <text x="456" y="157" font-family="Share Tech Mono,monospace" font-size="10" fill="#1a3a38">·</text>
  <text x="468" y="157" font-family="Share Tech Mono,monospace" font-size="11" letter-spacing="2" fill="#3a7a78">3D / WebGL</text>
  <text x="568" y="157" font-family="Share Tech Mono,monospace" font-size="10" fill="#1a3a38">·</text>
  <text x="580" y="157" font-family="Share Tech Mono,monospace" font-size="11" letter-spacing="2" fill="#3a7a78">Data &amp; APIs</text>

  <!-- Prompt line -->
  <text x="50" y="188" font-family="Share Tech Mono,monospace" font-size="12" fill="#00d9c8" opacity="0.25">$</text>
  <text x="64" y="188" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a6a68">ship in silence.</text>
  <rect x="204" y="176" width="6" height="14" fill="#00d9c8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- RIGHT: Stats — vertical dividers with glass feel -->
  <rect x="724" y="72" width="1" height="80" fill="url(#divV)"/>
  <rect x="812" y="72" width="1" height="80" fill="url(#divV)"/>

  <text x="744" y="102" font-family="Share Tech Mono,monospace" font-size="9" fill="#1e4a48" letter-spacing="2">REPOS</text>
  <text x="742" y="126" font-family="Orbitron,monospace" font-size="26" font-weight="700" fill="#00d9c8" opacity="0.9" filter="url(#titleGlow)">04</text>

  <text x="832" y="102" font-family="Share Tech Mono,monospace" font-size="9" fill="#1e4a48" letter-spacing="2">STARS</text>
  <text x="830" y="126" font-family="Orbitron,monospace" font-size="26" font-weight="700" fill="#00d9c8" opacity="0.9" filter="url(#titleGlow)">01</text>

  <!-- Bottom accent line -->
  <rect x="0" y="209" width="900" height="1" fill="url(#tealH)" opacity="0.4"/>
</svg>
