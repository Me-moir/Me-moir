<defs>
  <style>
    .eyebrow { font-family:"Courier New",Courier,monospace; font-size:8px;   fill:#3a5899;    letter-spacing:4px; }
    .title   { font-family:"Courier New",Courier,monospace; font-weight:900; font-size:48px; fill:#1a6eee; letter-spacing:12px; }
    .handle  { font-family:"Courier New",Courier,monospace; font-size:9px;   fill:#3a5899;    letter-spacing:6px; }
    .tag     { font-family:"Courier New",Courier,monospace; font-size:8.5px; fill:#7a9dcc;  letter-spacing:1px; }
    .statnum { font-family:"Courier New",Courier,monospace; font-weight:700; font-size:26px; fill:#e8f2ff; letter-spacing:1px; }
    .statlbl { font-family:"Courier New",Courier,monospace; font-size:7px;   fill:#3a5899;    letter-spacing:3px; }
    .online  { font-family:"Courier New",Courier,monospace; font-size:7px;   fill:#3a5899;    letter-spacing:2px; }
  </style>
  <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-10%" y="-20%" width="120%" height="140%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="wash" cx="18%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a6eee" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#1a6eee" stop-opacity="0"/>
  </radialGradient>
</defs>
