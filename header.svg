<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
<defs>
  <style>
    .mono { font-family: "Courier New", monospace; }
    .orbitron { font-family: "Courier New", monospace; font-weight: 900; }
  </style>
  <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#060d2e"/>
    <stop offset="100%" stop-color="#02050f"/>
  </linearGradient>
  <linearGradient id="haccent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a6eee" stop-opacity="0.18"/>
    <stop offset="60%" stop-color="#e0eeff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#1a6eee" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="nameglow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4a9fff"/>
    <stop offset="100%" stop-color="#1a6eee"/>
  </linearGradient>
  <filter id="textglow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- bg -->
<rect width="900" height="220" fill="url(#hbg)" rx="2"/>
<rect width="900" height="220" fill="url(#haccent)"/>

<!-- grid lines -->
<line x1="0" y1="60" x2="900" y2="60" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.4"/>
<line x1="0" y1="120" x2="900" y2="120" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.3"/>
<line x1="0" y1="180" x2="900" y2="180" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.3"/>
<line x1="180" y1="0" x2="180" y2="220" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.25"/>
<line x1="450" y1="0" x2="450" y2="220" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.25"/>
<line x1="720" y1="0" x2="720" y2="220" stroke="#e0eeff" stroke-width="0.4" stroke-opacity="0.25"/>

<!-- border -->
<rect width="900" height="220" fill="none" stroke="#6a8abf" stroke-width="1" rx="2"/>

<!-- corner brackets -->
<line x1="0" y1="0" x2="18" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="0" x2="0" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="882" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="900" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="220" x2="18" y2="220" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="220" x2="0" y2="202" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="220" x2="882" y2="220" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="220" x2="900" y2="202" stroke="#1a6eee" stroke-width="1.5"/>

<!-- top glass catchlight -->
<line x1="80" y1="1" x2="820" y2="1" stroke="rgba(100,160,255,0.4)" stroke-width="0.5"/>

<!-- section label -->
<text x="48" y="48" font-family="'Courier New',monospace" font-size="9" fill="#6a8abf" letter-spacing="3">OPERATOR // PROFILE</text>

<!-- name -->
<text x="48" y="130" font-family="'Courier New',monospace" font-size="52" font-weight="900" letter-spacing="6" fill="url(#nameglow)" filter="url(#textglow)">MEMOIR</text>

<!-- handle -->
<text x="50" y="155" font-family="'Courier New',monospace" font-size="11" fill="#6a8abf" letter-spacing="4">@ME-MOIR</text>

<!-- divider -->
<line x1="48" y1="168" x2="520" y2="168" stroke="#6a8abf" stroke-width="0.8"/>

<!-- focus items -->
<text x="48" y="188" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff" letter-spacing="2">Systems Architecture</text>
<text x="228" y="188" font-family="'Courier New',monospace" font-size="10" fill="#6a8abf">·</text>
<text x="242" y="188" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff" letter-spacing="2">Defense Tech</text>
<text x="362" y="188" font-family="'Courier New',monospace" font-size="10" fill="#6a8abf">·</text>
<text x="376" y="188" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff" letter-spacing="2">Full-Stack</text>
<text x="464" y="188" font-family="'Courier New',monospace" font-size="10" fill="#6a8abf">·</text>
<text x="478" y="188" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff" letter-spacing="2">3D / WebGL</text>
<text x="574" y="188" font-family="'Courier New',monospace" font-size="10" fill="#6a8abf">·</text>
<text x="588" y="188" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff" letter-spacing="2">Data &amp; APIs</text>

<!-- prompt -->
<text x="48" y="208" font-family="'Courier New',monospace" font-size="11" fill="#1a6eee">$</text>
<text x="62" y="208" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff">ship in silence.</text>
<rect x="198" y="197" width="7" height="13" fill="#1a6eee" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- stats top right -->
<text x="852" y="80" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#1a6eee" text-anchor="middle">04</text>
<text x="852" y="93" font-family="'Courier New',monospace" font-size="8" fill="#6a8abf" text-anchor="middle" letter-spacing="2">REPOS</text>
<text x="852" y="125" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#1a6eee" text-anchor="middle">01</text>
<text x="852" y="138" font-family="'Courier New',monospace" font-size="8" fill="#6a8abf" text-anchor="middle" letter-spacing="2">STARS</text>
<text x="852" y="170" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#1a6eee" text-anchor="middle">02</text>
<text x="852" y="183" font-family="'Courier New',monospace" font-size="8" fill="#6a8abf" text-anchor="middle" letter-spacing="2">FOLLOWERS</text>

<!-- vertical divider before stats -->
<line x1="810" y1="56" x2="810" y2="200" stroke="#6a8abf" stroke-width="0.8"/>

<!-- online dot -->
<circle cx="862" cy="36" r="4" fill="#1a6eee">
  <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="862" cy="36" r="9" fill="#1a6eee" fill-opacity="0">
  <animate attributeName="r" values="5;12;5" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="fill-opacity" values="0.12;0;0.12" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="874" y="40" font-family="'Courier New',monospace" font-size="9" fill="#e0eeff" letter-spacing="1">ONLINE</text>
</svg>
