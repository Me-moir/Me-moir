<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@700;900&amp;display=swap');
      .bg { fill: #080f10; }
      .border { fill: none; stroke: #0d2f2f; stroke-width: 1; }
      .accent { fill: none; stroke: #00d9c8; stroke-width: 2; }
      .title { font-family: 'Orbitron', 'Share Tech Mono', monospace; font-size: 38px; font-weight: 900; fill: #00d9c8; letter-spacing: 4px; }
      .sub { font-family: 'Share Tech Mono', monospace; font-size: 12px; fill: #2a5a5a; letter-spacing: 5px; }
      .meta-key { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #2a5a5a; }
      .meta-val { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #00d9c8; }
      .badge-bg { fill: rgba(0,217,200,0.06); stroke: #00d9c8; stroke-width: 1; }
      .badge-text { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #00d9c8; letter-spacing: 2px; }
      .badge-bg2 { fill: rgba(255,171,0,0.06); stroke: #ffab00; stroke-width: 1; }
      .badge-text2 { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #ffab00; letter-spacing: 2px; }
      .prompt { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #00d9c8; }
      .cmd { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #a8cece; }
      .divider { stroke: #0d2f2f; stroke-width: 1; }
      .scanline { fill: #00d9c8; opacity: 0.06; }
      .corner { fill: none; stroke: #00d9c8; stroke-width: 2; }
      .glow { filter: drop-shadow(0 0 8px #00d9c8); }
      .dot { fill: #00d9c8; }
      .dot-pulse { fill: #00d9c8; }
    </style>

    <!-- Scanline gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9c8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d9c8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d9c8;stop-opacity:0"/>
    </linearGradient>

    <!-- Title glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d9c8" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" class="bg"/>
  <rect width="900" height="200" fill="url(#grid)"/>

  <!-- Scanlines overlay -->
  <rect width="900" height="200" fill="#00d9c8" opacity="0.012">
    <animate attributeName="opacity" values="0.012;0.018;0.012" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Outer border -->
  <rect x="1" y="1" width="898" height="198" class="border"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="2" fill="url(#scanGrad)">
    <animateTransform attributeName="transform" type="translate" from="-900 0" to="900 0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="900" height="2" fill="#00d9c8" opacity="0.15"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="198" width="900" height="2" fill="#00d9c8" opacity="0.15"/>

  <!-- Corner brackets TL -->
  <polyline points="0,20 0,0 20,0" class="corner"/>
  <!-- Corner brackets TR -->
  <polyline points="880,0 900,0 900,20" class="corner"/>
  <!-- Corner brackets BL -->
  <polyline points="0,180 0,200 20,200" class="corner"/>
  <!-- Corner brackets BR -->
  <polyline points="880,200 900,200 900,180" class="corner"/>

  <!-- Status dot -->
  <circle cx="28" cy="28" r="4" class="dot-pulse">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="28" r="4" fill="none" stroke="#00d9c8" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- CLEARANCE label top -->
  <text x="42" y="24" class="sub" font-size="10">OPERATOR PROFILE // CLEARANCE: PUBLIC // ID: ME-MOIR</text>

  <!-- Main Title -->
  <text x="30" y="90" class="title" filter="url(#glow)">JANSSEN JEKK</text>

  <!-- Subtitle -->
  <text x="32" y="112" class="sub">@ME-MOIR  //  GITHUB  //  FULL-STACK + 3D + CLOUD</text>

  <!-- Divider line -->
  <line x1="30" y1="128" x2="560" y2="128" class="divider"/>

  <!-- Badges -->
  <rect x="30" y="138" width="90" height="20" rx="0" class="badge-bg"/>
  <text x="75" y="152" text-anchor="middle" class="badge-text">FULL-STACK</text>

  <rect x="128" y="138" width="70" height="20" rx="0" class="badge-bg"/>
  <text x="163" y="152" text-anchor="middle" class="badge-text">3D / WEBGL</text>

  <rect x="206" y="138" width="90" height="20" rx="0" class="badge-bg2"/>
  <text x="251" y="152" text-anchor="middle" class="badge-text2">CLOUD+DEVOPS</text>

  <rect x="304" y="138" width="84" height="20" rx="0" class="badge-bg"/>
  <text x="346" y="152" text-anchor="middle" class="badge-text">DATA + APIS</text>

  <!-- Prompt line -->
  <text x="30" y="185" class="prompt">root@janssen-jekk:~$</text>
  <text x="210" y="185" class="cmd">Building intelligent systems. Shipping in the dark.</text>
  <rect x="758" y="174" width="8" height="14" fill="#00d9c8">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- RIGHT: meta info -->
  <line x1="610" y1="30" x2="610" y2="170" stroke="#0d2f2f" stroke-width="1"/>

  <text x="625" y="55" class="meta-key">REPOS</text>
  <text x="720" y="55" class="meta-val">04</text>

  <text x="625" y="80" class="meta-key">STARS</text>
  <text x="720" y="80" class="meta-val">01</text>

  <text x="625" y="105" class="meta-key">FOLLOWERS</text>
  <text x="720" y="105" class="meta-val">02</text>

  <text x="625" y="130" class="meta-key">NODE</text>
  <text x="720" y="130" class="meta-val">GH-PROD-01</text>

  <text x="625" y="155" class="meta-key">STATUS</text>
  <text x="720" y="155" class="meta-val">ONLINE</text>

  <!-- Watermark -->
  <text x="820" y="100" font-family="'Share Tech Mono',monospace" font-size="52" fill="#00d9c8" opacity="0.03" font-weight="900" transform="rotate(90,820,100)">CLASSIFIED</text>
</svg>
