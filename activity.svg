<svg xmlns="http://www.w3.org/2000/svg" width="900" height="346" viewBox="0 0 900 346">
  <defs>
    <filter id="liq" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.6 0.3" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="b" in2="n" scale="2" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feComposite in="d" in2="SourceGraphic" operator="atop"/>
    </filter>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="346" gradientUnits="userSpaceOnUse">
