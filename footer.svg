<svg xmlns="http://www.w3.org/2000/svg" width="900" height="52" viewBox="0 0 900 52">
<defs>
  <linearGradient id="footbg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a6eee" stop-opacity="0.1"/>
    <stop offset="50%" stop-color="#060d2e"/>
    <stop offset="100%" stop-color="#1a6eee" stop-opacity="0.1"/>
  </linearGradient>
</defs>

<rect width="900" height="52" fill="#060d2e" rx="2"/>
<rect width="900" height="52" fill="url(#footbg)"/>
<rect width="900" height="52" fill="none" stroke="#6a8abf" stroke-width="1" rx="2"/>

<!-- corner brackets -->
<line x1="0" y1="0" x2="18" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="0" x2="0" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="882" y2="0" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="0" x2="900" y2="18" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="52" x2="18" y2="52" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="0" y1="52" x2="0" y2="34" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="52" x2="882" y2="52" stroke="#1a6eee" stroke-width="1.5"/>
<line x1="900" y1="52" x2="900" y2="34" stroke="#1a6eee" stroke-width="1.5"/>

<!-- glass catchlight -->
<line x1="80" y1="1" x2="820" y2="1" stroke="rgba(100,160,255,0.35)" stroke-width="0.5"/>

<!-- online dot left -->
<circle cx="32" cy="26" r="4" fill="#1a6eee">
  <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="32" cy="26" r="9" fill="#1a6eee" fill-opacity="0">
  <animate attributeName="r" values="5;11;5" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="fill-opacity" values="0.1;0;0.1" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="46" y="30" font-family="'Courier New',monospace" font-size="11" fill="#e0eeff">github.com/Me-moir</text>

<!-- center tagline -->
<text x="450" y="30" font-family="'Courier New',monospace" font-size="10" fill="#6a8abf" text-anchor="middle" letter-spacing="2">ship in silence.</text>

<!-- right status -->
<text x="868" y="30" font-family="'Courier New',monospace" font-size="11" fill="#1a6eee" text-anchor="end" letter-spacing="1">ONLINE</text>
</svg>
