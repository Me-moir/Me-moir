<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <filter id="liq" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.55 0.3" numOctaves="3" seed="5" result="n"/>
      <feDisplacementMap in="b" in2="n" scale="2" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feComposite in="d" in2="SourceGraphic" operator="atop"/>
    </filter>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040c0e"/>
      <stop offset="100%" stop-color="#020809"/>
    </linearGradient>
    <linearGradient id="glassL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0.018"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimAnim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="42%"  stop-color="transparent"/>
      <stop offset="50%"  stop-color="rgba(200,255,252,0.04)"/>
      <stop offset="58%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="divV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d9c8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00d9c8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00d9c8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d9c8" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="900" height="420" fill="url(#bgG)"/>
  <rect width="900" height="420" fill="url(#grid)"/>

  <!-- Glass panel -->
  <rect width="900" height="420" fill="url(#glassL)" filter="url(#liq)"/>
  <rect x="0" y="0" width="900" height="1" fill="url(#shine)" opacity="0.5"/>

  <!-- Shimmer -->
  <rect x="-900" y="0" width="900" height="420" fill="url(#shimAnim)">
    <animateTransform attributeName="transform" type="translate"
      from="-900 0" to="1800 0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <rect x="0.5" y="0.5" width="899" height="419" fill="none" stroke="#00d9c8" stroke-width="1" stroke-opacity="0.1"/>
  <polyline points="0,14 0,0 14,0"           fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="886,0 900,0 900,14"       fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="0,406 0,420 14,420"       fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="886,420 900,420 900,406"  fill="none" stroke="#00d9c8" stroke-width="1.5" stroke-opacity="0.7"/>

  <text x="36" y="30" font-family="Share Tech Mono,monospace" font-size="9" fill="#1e4a48" letter-spacing="3">STACK</text>
  <rect x="36" y="38" width="828" height="1" fill="#00d9c8" opacity="0.07"/>

  <!-- Column dividers -->
  <rect x="310" y="44" width="1" height="356" fill="url(#divV)"/>
  <rect x="606" y="44" width="1" height="356" fill="url(#divV)"/>

  <!-- ─── COL 1: FRONTEND + 3D ─── -->
  <text x="36" y="62" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">FRONTEND</text>
  <circle cx="41" cy="78"  r="2.5" fill="#00d9c8" opacity="0.7"/><text x="52" y="82"  font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">Next.js</text>
  <circle cx="41" cy="100" r="2.5" fill="#00d9c8" opacity="0.7"/><text x="52" y="104" font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">React</text>
  <circle cx="41" cy="122" r="2.5" fill="#00d9c8" opacity="0.7"/><text x="52" y="126" font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">TypeScript</text>
  <circle cx="41" cy="144" r="2.5" fill="#00d9c8" opacity="0.5"/><text x="52" y="148" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a6a68">Tailwind CSS</text>
  <circle cx="41" cy="166" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="52" y="170" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">shadcn/ui</text>
  <circle cx="41" cy="188" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="52" y="192" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Radix UI</text>
  <circle cx="41" cy="210" r="2.5" fill="#00d9c8" opacity="0.3"/><text x="52" y="214" font-family="Share Tech Mono,monospace" font-size="12" fill="#1a4040">Framer Motion</text>

  <rect x="36" y="228" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="36" y="244" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">3D / VISUALIZATION</text>
  <circle cx="41" cy="260" r="2.5" fill="#ffab00" opacity="0.8"/><text x="52" y="264" font-family="Share Tech Mono,monospace" font-size="12" fill="#8a6a28">Three.js</text>
  <circle cx="41" cy="282" r="2.5" fill="#ffab00" opacity="0.7"/><text x="52" y="286" font-family="Share Tech Mono,monospace" font-size="12" fill="#8a6a28">React Three Fiber</text>
  <circle cx="41" cy="304" r="2.5" fill="#ffab00" opacity="0.5"/><text x="52" y="308" font-family="Share Tech Mono,monospace" font-size="12" fill="#5a4818">Drei</text>
  <circle cx="41" cy="326" r="2.5" fill="#ffab00" opacity="0.5"/><text x="52" y="330" font-family="Share Tech Mono,monospace" font-size="12" fill="#5a4818">WebGL</text>
  <circle cx="41" cy="348" r="2.5" fill="#ffab00" opacity="0.3"/><text x="52" y="352" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a3010">GLSL / Shaders</text>

  <rect x="36" y="366" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="36" y="382" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">STATE</text>
  <circle cx="41" cy="398" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="52" y="402" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Zustand</text>

  <!-- ─── COL 2: BACKEND + DB ─── -->
  <text x="330" y="62" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">BACKEND</text>
  <circle cx="335" cy="78"  r="2.5" fill="#00d9c8" opacity="0.7"/><text x="346" y="82"  font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">Node.js</text>
  <circle cx="335" cy="100" r="2.5" fill="#00d9c8" opacity="0.6"/><text x="346" y="104" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a7a78">Express</text>
  <circle cx="335" cy="122" r="2.5" fill="#00d9c8" opacity="0.6"/><text x="346" y="126" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a7a78">NestJS</text>
  <circle cx="335" cy="144" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="346" y="148" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Socket.io</text>
  <circle cx="335" cy="166" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="346" y="170" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Next.js API Routes</text>

  <rect x="330" y="184" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="330" y="200" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">AUTH</text>
  <circle cx="335" cy="216" r="2.5" fill="#00d9c8" opacity="0.5"/><text x="346" y="220" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a6a68">NextAuth.js</text>
  <circle cx="335" cy="238" r="2.5" fill="#00d9c8" opacity="0.4"/><text x="346" y="242" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Clerk</text>
  <circle cx="335" cy="260" r="2.5" fill="#00d9c8" opacity="0.3"/><text x="346" y="264" font-family="Share Tech Mono,monospace" font-size="12" fill="#1a4040">JWT / OAuth2</text>

  <rect x="330" y="278" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="330" y="294" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">DATABASE</text>
  <circle cx="335" cy="310" r="2.5" fill="#5a9a98" opacity="0.8"/><text x="346" y="314" font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">PostgreSQL</text>
  <circle cx="335" cy="332" r="2.5" fill="#5a9a98" opacity="0.7"/><text x="346" y="336" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a7a78">MySQL</text>
  <circle cx="335" cy="354" r="2.5" fill="#5a9a98" opacity="0.6"/><text x="346" y="358" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a6a68">MongoDB</text>
  <circle cx="335" cy="376" r="2.5" fill="#5a9a98" opacity="0.5"/><text x="346" y="380" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Firebase</text>
  <circle cx="335" cy="398" r="2.5" fill="#5a9a98" opacity="0.4"/><text x="346" y="402" font-family="Share Tech Mono,monospace" font-size="12" fill="#1a4040">Prisma · Drizzle</text>

  <!-- ─── COL 3: CLOUD + DATA + DX ─── -->
  <text x="626" y="62" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">CLOUD / INFRA</text>
  <circle cx="631" cy="78"  r="2.5" fill="#ffab00" opacity="0.7"/><text x="642" y="82"  font-family="Share Tech Mono,monospace" font-size="12" fill="#8a6a28">Vercel</text>
  <circle cx="631" cy="100" r="2.5" fill="#ffab00" opacity="0.7"/><text x="642" y="104" font-family="Share Tech Mono,monospace" font-size="12" fill="#8a6a28">AWS</text>
  <circle cx="631" cy="122" r="2.5" fill="#ffab00" opacity="0.6"/><text x="642" y="126" font-family="Share Tech Mono,monospace" font-size="12" fill="#6a5020">Google Cloud</text>
  <circle cx="631" cy="144" r="2.5" fill="#ffab00" opacity="0.5"/><text x="642" y="148" font-family="Share Tech Mono,monospace" font-size="12" fill="#5a4018">Azure</text>
  <circle cx="631" cy="166" r="2.5" fill="#ffab00" opacity="0.5"/><text x="642" y="170" font-family="Share Tech Mono,monospace" font-size="12" fill="#5a4018">Docker</text>
  <circle cx="631" cy="188" r="2.5" fill="#ffab00" opacity="0.4"/><text x="642" y="192" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a3010">Kubernetes</text>
  <circle cx="631" cy="210" r="2.5" fill="#ffab00" opacity="0.3"/><text x="642" y="214" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a2208">Cloudflare</text>

  <rect x="626" y="228" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="626" y="244" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">DATA / APIs</text>
  <circle cx="631" cy="260" r="2.5" fill="#5a9a98" opacity="0.7"/><text x="642" y="264" font-family="Share Tech Mono,monospace" font-size="12" fill="#4a8a88">GraphQL</text>
  <circle cx="631" cy="282" r="2.5" fill="#5a9a98" opacity="0.6"/><text x="642" y="286" font-family="Share Tech Mono,monospace" font-size="12" fill="#3a7a78">tRPC</text>
  <circle cx="631" cy="304" r="2.5" fill="#5a9a98" opacity="0.5"/><text x="642" y="308" font-family="Share Tech Mono,monospace" font-size="12" fill="#2a6a68">REST</text>
  <circle cx="631" cy="326" r="2.5" fill="#5a9a98" opacity="0.4"/><text x="642" y="330" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">OpenAPI / Swagger</text>

  <rect x="626" y="344" width="256" height="1" fill="#00d9c8" opacity="0.05"/>
  <text x="626" y="360" font-family="Share Tech Mono,monospace" font-size="9" fill="#0d2828" letter-spacing="2">MONITORING</text>
  <circle cx="631" cy="376" r="2.5" fill="#5a9a98" opacity="0.4"/><text x="642" y="380" font-family="Share Tech Mono,monospace" font-size="12" fill="#1e5050">Sentry · Datadog</text>
  <circle cx="631" cy="398" r="2.5" fill="#5a9a98" opacity="0.3"/><text x="642" y="402" font-family="Share Tech Mono,monospace" font-size="12" fill="#1a4040">Prometheus · Grafana</text>
</svg>
